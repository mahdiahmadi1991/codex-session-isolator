name: Security

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  powershell-syntax:
    name: PowerShell Syntax
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate PowerShell scripts syntax
        shell: pwsh
        run: |
          $failed = @()
          Get-ChildItem -Path . -Recurse -File -Include *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors -and $errors.Count -gt 0) {
              foreach ($err in $errors) {
                $failed += ("{0}: {1}" -f $_.FullName, $err.Message)
              }
            }
          }

          if ($failed.Count -gt 0) {
            $failed | ForEach-Object { Write-Error $_ }
            throw "PowerShell syntax validation failed."
          }

  extension-audit:
    name: Extension Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Audit dependencies
        working-directory: extension
        shell: bash
        run: |
          npm ci
          attempt=1
          max_attempts=2
          while true; do
            set +e
            npm audit --audit-level=high --json > audit.json 2> audit.err
            status=$?
            set -e

            if [[ $status -eq 0 ]]; then
              echo "No high/critical vulnerabilities found."
              break
            fi

            set +e
            node -e "const fs=require('fs');try{const report=JSON.parse(fs.readFileSync('audit.json','utf8'));const message=String(report?.message ?? '').toLowerCase();if(report?.error||report?.statusCode||report?.code||message.includes('forbidden')||message.includes('cloudflare')||message.includes('just a moment')){process.exit(30);}const vuln=report?.metadata?.vulnerabilities;if(!vuln||typeof vuln!=='object'){process.exit(20);}const high=Number(vuln.high ?? 0);const critical=Number(vuln.critical ?? 0);console.log('high='+high+' critical='+critical);process.exit((high+critical)>0?10:0);}catch{process.exit(20);}"
            parsed_status=$?
            set -e

            if [[ $parsed_status -eq 10 ]]; then
              echo "High or critical vulnerabilities detected."
              cat audit.json
              exit 1
            fi

            if [[ $parsed_status -eq 0 ]]; then
              echo "No high/critical vulnerabilities reported."
              break
            fi

            if [[ $parsed_status -eq 30 ]]; then
              if [[ $attempt -lt $max_attempts ]]; then
                attempt=$((attempt + 1))
                echo "npm audit endpoint unavailable; retrying (${attempt}/${max_attempts})..."
                sleep 10
                continue
              fi
              echo "::warning::npm audit endpoint unavailable on runner; skipping strict audit for this run."
              break
            fi

            if grep -Eqi "audit endpoint returned an error|403 Forbidden|cloudflare|just a moment" audit.err audit.json; then
              if [[ $attempt -lt $max_attempts ]]; then
                attempt=$((attempt + 1))
                echo "npm audit endpoint unavailable; retrying (${attempt}/${max_attempts})..."
                sleep 10
                continue
              fi
              echo "::warning::npm audit endpoint unavailable on runner; skipping strict audit for this run."
              break
            fi

            echo "npm audit failed for an unexpected reason."
            cat audit.err
            cat audit.json
            exit 1
          done

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
