name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  windows-pwsh:
    name: Windows tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Windows integration tests
        shell: pwsh
        run: |
          ./tests/Test-Windows.ps1

  linux-bash:
    name: Linux tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Linux integration tests
        run: |
          chmod +x tests/test-linux.sh
          ./tests/test-linux.sh

  macos-bash:
    name: macOS tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run macOS integration tests
        run: |
          chmod +x tests/test-linux.sh
          ./tests/test-linux.sh
