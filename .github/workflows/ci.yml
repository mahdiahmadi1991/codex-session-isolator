name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  extension-build:
    name: Extension build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Build extension
        working-directory: extension
        run: |
          npm ci
          npm run compile

      - name: Verify bundled wizard sync
        run: |
          git diff --exit-code -- extension/scripts/vsc-launcher-wizard.ps1

  windows-pwsh:
    name: Windows tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Windows integration tests
        shell: pwsh
        run: |
          ./tests/Test-Windows.ps1

  linux-bash:
    name: Linux tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Linux integration tests
        run: |
          chmod +x tests/test-linux.sh
          ./tests/test-linux.sh

  macos-bash:
    name: macOS tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run macOS integration tests
        run: |
          chmod +x tests/test-linux.sh
          ./tests/test-linux.sh
