name: Extension Publish

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Publish channel
        required: true
        default: pre-release
        type: choice
        options:
          - pre-release
          - stable
      release_tag:
        description: Required for stable manual publish. Must equal v<extension.version> and exist in git tags.
        required: false
        type: string
  push:
    branches: ["pre-release", "main"]

concurrency:
  group: extension-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish VS Code extension
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref_name == 'pre-release' || github.ref_name == 'main'))
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install and compile extension
        working-directory: extension
        run: |
          npm ci
          npm run compile

      - name: Resolve publish channel
        id: channel
        shell: bash
        run: |
          channel=""
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            channel="${{ github.event.inputs.channel }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            if [[ "${GITHUB_REF_NAME}" == "pre-release" ]]; then
              channel="pre-release"
            elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              channel="stable"
            fi
          fi
          if [[ -z "${channel}" ]]; then
            echo "Unable to resolve publish channel for event=${GITHUB_EVENT_NAME} ref=${GITHUB_REF_NAME}."
            exit 1
          fi
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Prepare extension manifest for selected channel
        working-directory: extension
        shell: bash
        run: |
          channel="${{ steps.channel.outputs.channel }}"
          CHANNEL="$channel" node - <<'NODE'
          const fs = require("fs");
          const path = "./package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          const channel = process.env.CHANNEL;

          if (channel === "pre-release") {
            pkg.preview = true;
          } else {
            delete pkg.preview;
          }

          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          console.log(`manifest prepared for channel=${channel}, preview=${Boolean(pkg.preview)}`);
          NODE

      - name: Validate VSCE_PAT
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [[ -z "${VSCE_PAT:-}" ]]; then
            echo "Missing required repository secret: VSCE_PAT"
            echo "Create it from a Visual Studio Marketplace Personal Access Token."
            exit 1
          fi

      - name: Validate stable publish source and release tag policy
        if: steps.channel.outputs.channel == 'stable'
        shell: bash
        run: |
          version=$(node -p "require('./extension/package.json').version")
          expected_tag="v${version}"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
              echo "Stable workflow_dispatch runs must target ref 'main'. Current ref: ${GITHUB_REF_NAME}"
              exit 1
            fi

            release_tag="${{ github.event.inputs.release_tag }}"
            if [[ -z "${release_tag}" ]]; then
              echo "Missing required workflow input: release_tag"
              echo "For stable manual publish, provide release_tag=${expected_tag}."
              exit 1
            fi

            if [[ "${release_tag}" != "${expected_tag}" ]]; then
              echo "release_tag (${release_tag}) must match extension version tag (${expected_tag})."
              exit 1
            fi

            git fetch --force --tags origin
            if ! git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
              echo "Tag ${release_tag} does not exist in git."
              exit 1
            fi
          fi

      - name: Validate extension preview flag for stable publish
        if: steps.channel.outputs.channel == 'stable'
        shell: bash
        run: |
          preview=$(node -p "Boolean(require('./extension/package.json').preview)")
          if [[ "${preview}" == "true" ]]; then
            echo "Stable publish requires extension/package.json preview=false (or omitted)."
            exit 1
          fi

      - name: Validate pre-release version format
        if: steps.channel.outputs.channel == 'pre-release'
        shell: bash
        run: |
          version=$(node -p "require('./extension/package.json').version")
          if [[ "$version" == *-* ]]; then
            echo "Pre-release publishing requires a plain semver version (x.y.z)."
            echo "Current version '$version' contains a pre-release suffix which Marketplace does not accept."
            exit 1
          fi
          echo "Using pre-release package version: $version"

      - name: Package extension
        working-directory: extension
        shell: bash
        run: |
          rm -f ./*.vsix ./*.vsix.sha256
          if [[ "${{ steps.channel.outputs.channel }}" == "pre-release" ]]; then
            npx @vscode/vsce package --pre-release --no-dependencies
          else
            npx @vscode/vsce package --no-dependencies
          fi

      - name: Generate checksum
        id: package
        working-directory: extension
        shell: bash
        run: |
          vsix_file="$(ls -1t *.vsix | head -n 1)"
          if [[ -z "$vsix_file" ]]; then
            echo "No VSIX file found after packaging."
            exit 1
          fi
          sha256sum "$vsix_file" > "${vsix_file}.sha256"
          echo "vsix_file=${vsix_file}" >> "$GITHUB_OUTPUT"
          echo "vsix_path=extension/${vsix_file}" >> "$GITHUB_OUTPUT"
          echo "sha_path=extension/${vsix_file}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix-${{ steps.channel.outputs.channel }}-${{ github.run_number }}
          path: |
            ${{ steps.package.outputs.vsix_path }}
            ${{ steps.package.outputs.sha_path }}

      - name: Publish pre-release to Visual Studio Marketplace
        if: steps.channel.outputs.channel == 'pre-release'
        working-directory: extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npx @vscode/vsce publish --pre-release --no-dependencies --packagePath "${{ steps.package.outputs.vsix_file }}" --skip-duplicate

      - name: Publish stable release to Visual Studio Marketplace
        if: steps.channel.outputs.channel == 'stable'
        working-directory: extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npx @vscode/vsce publish --no-dependencies --packagePath "${{ steps.package.outputs.vsix_file }}" --skip-duplicate

      - name: Verify published channel metadata
        shell: bash
        run: |
          channel="${{ steps.channel.outputs.channel }}"
          version=$(node -p "require('./extension/package.json').version")
          extension_id=$(node -p "const p=require('./extension/package.json'); `${p.publisher}.${p.name}`")

          payload=""
          for attempt in 1 2 3 4 5 6; do
            if payload=$(cd extension && npx @vscode/vsce show "$extension_id" --json 2>/dev/null); then
              break
            fi
            sleep 10
          done

          if [[ -z "$payload" ]]; then
            echo "Unable to fetch extension metadata from Marketplace for verification."
            exit 1
          fi

          tmp_json="$(mktemp)"
          printf "%s" "$payload" > "$tmp_json"

          CHANNEL="$channel" VERSION="$version" TMP_JSON="$tmp_json" node - <<'NODE'
          const fs = require("fs");
          const channel = process.env.CHANNEL;
          const version = process.env.VERSION;
          const data = JSON.parse(fs.readFileSync(process.env.TMP_JSON, "utf8"));
          const versions = Array.isArray(data.versions) ? data.versions : [];
          const target = versions.find((v) => v.version === version);
          if (!target) {
            console.error(`Published version ${version} was not found in Marketplace metadata.`);
            process.exit(1);
          }

          const props = Array.isArray(target.properties) ? target.properties : [];
          const preReleaseProp = props.find((p) => p.key === "Microsoft.VisualStudio.Code.PreRelease");
          const isPreRelease = String(preReleaseProp?.value || "").toLowerCase() === "true";

          if (channel === "pre-release" && !isPreRelease) {
            console.error(`Expected pre-release metadata for version ${version}, but it is not marked as pre-release.`);
            process.exit(1);
          }
          if (channel === "stable" && isPreRelease) {
            console.error(`Expected stable metadata for version ${version}, but Marketplace still marks it as pre-release.`);
            process.exit(1);
          }

          console.log(`Marketplace metadata verified for version ${version} on channel=${channel}.`);
          NODE

