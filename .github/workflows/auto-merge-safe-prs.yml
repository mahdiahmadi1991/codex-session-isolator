name: Auto Merge Safe PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge for safe PRs
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate and enable auto-merge
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            async function disableAutoMergeIfEnabled(reason) {
              try {
                await github.graphql(
                  `
                  mutation DisableAutoMerge($pullRequestId: ID!) {
                    disablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId }) {
                      pullRequest {
                        number
                      }
                    }
                  }
                  `,
                  { pullRequestId: pr.node_id }
                );
                core.info(`Auto-merge disabled for PR #${pr.number}. Reason: ${reason}`);
              } catch (error) {
                const message = String(error?.message || error);
                if (
                  message.includes("is not enabled") ||
                  message.includes("Auto merge is not enabled")
                ) {
                  core.info(`Auto-merge was already disabled for PR #${pr.number}.`);
                  return;
                }
                throw error;
              }
            }

            if (!pr) {
              core.info("No pull request payload.");
              return;
            }

            if (pr.draft) {
              core.info("Draft PR; skipping.");
              await disableAutoMergeIfEnabled("PR is draft");
              return;
            }

            const baseRef = pr.base.ref;
            if (!["pre-release", "main"].includes(baseRef)) {
              core.info(`Base branch '${baseRef}' is not eligible.`);
              await disableAutoMergeIfEnabled(`ineligible base branch: ${baseRef}`);
              return;
            }

            const labels = (pr.labels || []).map((l) => l.name);
            const hasSafeLabel = labels.includes("automerge:safe");
            const isDependabot = pr.user?.login === "dependabot[bot]";

            if (!hasSafeLabel && !isDependabot) {
              core.info("PR is neither dependabot nor labeled automerge:safe.");
              await disableAutoMergeIfEnabled("missing automerge:safe label and not dependabot");
              return;
            }

            const safePrefixes = [
              "docs/",
              ".github/workflows/"
            ];
            const safeFiles = new Set([
              "README.md",
              "CHANGELOG.md",
              "CONTRIBUTING.md",
              "SECURITY.md",
              "PRIVACY.md",
              ".github/dependabot.yml"
            ]);
            const disallowedFiles = new Set([
              ".github/workflows/auto-merge-safe-prs.yml"
            ]);

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            if (files.length === 0) {
              core.info("No changed files; skipping.");
              await disableAutoMergeIfEnabled("PR has no changed files");
              return;
            }

            const unsafeFiles = files
              .map((f) => f.filename)
              .filter((filename) => {
                if (disallowedFiles.has(filename)) {
                  return true;
                }
                if (safeFiles.has(filename)) {
                  return false;
                }
                return !safePrefixes.some((prefix) => filename.startsWith(prefix));
              });

            if (unsafeFiles.length > 0) {
              core.notice(
                `Auto-merge skipped because unsafe paths were changed: ${unsafeFiles.join(", ")}`
              );
              await disableAutoMergeIfEnabled(
                `unsafe files changed: ${unsafeFiles.join(", ")}`
              );
              return;
            }

            try {
              await github.graphql(
                `
                mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(
                    input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }
                  ) {
                    pullRequest {
                      number
                    }
                  }
                }
                `,
                { pullRequestId: pr.node_id }
              );
              core.info(`Auto-merge enabled for PR #${pr.number}.`);
            } catch (error) {
              const message = String(error?.message || error);
              if (
                message.includes("already enabled") ||
                message.includes("Pull request Auto merge is already enabled")
              ) {
                core.info(`Auto-merge was already enabled for PR #${pr.number}.`);
                return;
              }
              throw error;
            }
