name: Bug report
description: Report a reproducible problem in launcher behavior
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include enough detail to reproduce quickly.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS + shell + VS Code version + WSL distro (if any)
      placeholder: "Windows 11, PowerShell 7.5, VS Code 1.109, WSL Ubuntu-24.04"
    validations:
      required: true
  - type: dropdown
    id: launcher
    attributes:
      label: Launcher used
      options:
        - launchers/CodexSessionIsolator.ps1
        - launchers/codex-session-isolator.bat
        - launchers/codex-session-isolator.sh
        - launchers/CodexWorkspaceLauncher.ps1 (compat)
        - launchers/codex-workspace-launcher.sh (compat)
        - launchers/OpenAlynBookWSL.bat
    validations:
      required: true
  - type: input
    id: target_path
    attributes:
      label: Target path passed
      placeholder: "/home/user/projects/app/App.code-workspace"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Command output / logs
      description: Paste relevant terminal output
      render: shell
    validations:
      required: false
