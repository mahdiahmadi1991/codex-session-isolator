<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex Session Isolator Banner</title>
  <desc id="desc">Per-project Codex session isolation for VS Code targets across Windows, WSL, Linux, and macOS.</desc>

  <defs>
